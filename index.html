<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>DebtClear — Debt Payoff Calculator</title>
    <meta name="description" content="Find out exactly when you'll be debt-free. Enter your debts, get a personalized avalanche payoff plan, and download your strategy to Excel. 100% private — runs entirely in your browser." />
    <meta name="author" content="DebtClear" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="DebtClear — Debt Payoff Calculator" />
    <meta property="og:description" content="Find out exactly when you'll be debt-free. Personalized avalanche payoff plan. 100% private — runs in your browser." />
    <meta property="og:url"         content="https://debtclear.vercel.app" />
    <meta property="og:image"       content="https://debtclear.vercel.app/apple-touch-icon.svg" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="DebtClear — Debt Payoff Calculator" />
    <meta name="twitter:description" content="Find out exactly when you'll be debt-free. Avalanche payoff plan. 100% private." />
    <meta name="twitter:image"       content="https://debtclear.vercel.app/apple-touch-icon.svg" />

    <!-- PWA / mobile -->
    <meta name="mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title"   content="DebtClear" />
  </head>
