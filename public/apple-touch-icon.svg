<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Rounded square background -->
  <rect width="180" height="180" rx="40" fill="#4f46e5"/>

  <!-- Dollar sign with downward arrow — "paying down debt" -->
  <!-- Vertical bar of $ -->
  <rect x="87" y="28" width="6" height="16" rx="3" fill="white"/>
  <rect x="87" y="108" width="6" height="16" rx="3" fill="white"/>

  <!-- S curve of $ -->
  <path d="M104 52 C104 43 96 38 90 38 C84 38 76 42 76 52 C76 62 90 65 90 65 C90 65 104 68 104 80 C104 90 96 94 90 94 C84 94 76 89 76 80"
        stroke="white" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Downward arrow -->
  <line x1="90" y1="118" x2="90" y2="148" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <polyline points="74,134 90,150 106,134" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
